name: Release

# Push a tag like v0.1.0 to build installers and publish a GitHub Release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Apple Silicon
          - platform: macos-latest
            target: aarch64-apple-darwin
          # macOS — Intel
          - platform: macos-latest
            target: x86_64-apple-darwin
          # Windows — x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Fetch Caddy sidecar
        run: node scripts/fetch-caddy.mjs --target ${{ matrix.target }}

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Hostman ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
          releaseBody: |
            ## Hostman ${{ github.ref_name }}

            Tải installer cho hệ điều hành của bạn ở phần Assets bên dưới.

            > **Lưu ý — app chưa ký số (unsigned):**
            > - **macOS**: lần đầu mở vào *System Settings → Privacy & Security → Open Anyway*,
            >   hoặc chạy `xattr -dr com.apple.quarantine /Applications/Hostman.app`.
            > - **Windows**: SmartScreen → *More info → Run anyway*.
